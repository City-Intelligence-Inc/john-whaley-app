<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Profile Collector</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }

  .top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: #111; border-bottom: 1px solid #222;
    padding: 12px 24px; display: flex; align-items: center; justify-content: space-between;
  }
  .progress { font-size: 14px; color: #888; }
  .progress strong { color: #4fc3f7; font-size: 18px; }
  .top-actions { display: flex; gap: 8px; }
  .top-actions button {
    padding: 6px 14px; border-radius: 6px; border: 1px solid #333;
    background: #1a1a1a; color: #ccc; cursor: pointer; font-size: 13px;
  }
  .top-actions button:hover { background: #252525; }
  .top-actions button.primary { background: #1565c0; border-color: #1976d2; color: #fff; }
  .top-actions button.primary:hover { background: #1976d2; }
  .top-actions button.danger { border-color: #c62828; color: #ef5350; }

  .container { max-width: 720px; margin: 0 auto; padding: 76px 20px 40px; }

  .card {
    background: #141414; border: 1px solid #222; border-radius: 12px;
    padding: 24px; margin-bottom: 16px;
  }

  .person-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .person-header h1 { font-size: 22px; font-weight: 600; }
  .person-header .email { font-size: 13px; color: #888; }

  .linkedin-link {
    display: inline-flex; align-items: center; gap: 6px;
    background: #0a66c2; color: #fff; padding: 8px 16px; border-radius: 8px;
    text-decoration: none; font-size: 14px; font-weight: 500; margin-bottom: 20px;
    transition: background 0.15s;
  }
  .linkedin-link:hover { background: #004182; }

  .photo-zone {
    border: 2px dashed #333; border-radius: 10px; padding: 20px;
    text-align: center; cursor: pointer; margin-bottom: 16px;
    transition: border-color 0.2s; min-height: 100px;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
  }
  .photo-zone:hover, .photo-zone.dragover { border-color: #4fc3f7; }
  .photo-zone img { max-width: 120px; max-height: 120px; border-radius: 50%; }
  .photo-zone .hint { color: #555; font-size: 13px; }

  .paste-area {
    width: 100%; min-height: 300px; background: #0d0d0d; border: 1px solid #222;
    border-radius: 8px; padding: 16px; color: #e0e0e0; font-size: 14px;
    line-height: 1.6; resize: vertical; font-family: inherit;
  }
  .paste-area:focus { outline: none; border-color: #4fc3f7; }
  .paste-area::placeholder { color: #444; }

  label { display: block; font-size: 12px; color: #666; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

  .nav-row { display: flex; gap: 10px; margin-top: 16px; }
  .nav-row button {
    flex: 1; padding: 14px; border-radius: 8px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s;
  }
  .btn-skip { background: #222; color: #888; }
  .btn-skip:hover { background: #2a2a2a; }
  .btn-save { background: #2e7d32; color: #fff; }
  .btn-save:hover { background: #388e3c; }

  .status-badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
  }
  .status-done { background: #1b5e20; color: #66bb6a; }
  .status-skipped { background: #4e342e; color: #bcaaa4; }
  .status-pending { background: #1a1a1a; color: #555; }

  .queue-list {
    max-height: 400px; overflow-y: auto; margin-top: 12px;
  }
  .queue-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; border-bottom: 1px solid #1a1a1a; font-size: 13px;
    cursor: pointer; border-radius: 4px;
  }
  .queue-item:hover { background: #1a1a1a; }
  .queue-item.active { background: #0d47a1; }
  .queue-item .name { flex: 1; }

  .keyboard-hint {
    text-align: center; margin-top: 12px; font-size: 12px; color: #444;
  }
  kbd {
    background: #222; border: 1px solid #333; border-radius: 4px;
    padding: 2px 6px; font-size: 11px; color: #888;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #2e7d32; color: #fff; padding: 10px 20px; border-radius: 8px;
    font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .hidden { display: none; }
</style>
</head>

<div class="top-bar">

  <div class="top-actions">

</div>

</div>

const STORAGE_KEY = 'linkedin_scrape_data';

// State
let currentIndex = 0;
let results = {}; // keyed by linkedin url

// Load saved state
function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      results = parsed.results || {};
      currentIndex = parsed.currentIndex || 0;
    }
  } catch(e) {}
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ results, currentIndex }));
}

function render() {
  const p = PROFILES[currentIndex];
  if (!p) return;

  document.getElementById('personName').textContent = p.name;
  document.getElementById('personEmail').textContent = p.email;
  document.getElementById('linkedinLink').href = p.url;
  document.getElementById('linkedinLink').textContent = 'Open LinkedIn Profile →';

  // Restore if already saved
  const existing = results[p.url];
  if (existing && existing.content) {
    document.getElementById('pasteArea').value = existing.content;
  } else {
    document.getElementById('pasteArea').value = '';
  }

  // Photo
  const photoZone = document.getElementById('photoZone');
  if (existing && existing.photo) {
    photoZone.innerHTML = `<img src="${existing.photo}" alt="photo">`;
  } else {
    photoZone.innerHTML = '<span class="hint" id="photoHint">Paste (Cmd+V), drag, or click to add photo</span>';
  }

  updateCounts();
  renderQueue();
  document.getElementById('pasteArea').focus();
}

function updateCounts() {
  let done = 0, skipped = 0;
  PROFILES.forEach(p => {
    const r = results[p.url];
    if (r && r.status === 'done') done++;
    if (r && r.status === 'skipped') skipped++;
  });
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = PROFILES.length;
  document.getElementById('skippedCount').textContent = skipped;
}

const API_BASE = 'http://localhost:8000';

function saveAndNext() {
  const p = PROFILES[currentIndex];
  const content = document.getElementById('pasteArea').value.trim();
  if (!content) {
    toast('Paste some content first!', '#c62828');
    return;
  }

  const photoEl = document.querySelector('.photo-zone img');
  const photoData = photoEl ? photoEl.src : null;

  results[p.url] = {
    name: p.name,
    email: p.email,
    url: p.url,
    content: content,
    photo: photoData,
    status: 'done',
    scraped_at: new Date().toISOString()
  };
  saveState();
  toast(`Saved ${p.name}`);

  // Upload in background — don't block the UI
  fetch(`${API_BASE}/linkedin/manual-scrape`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      url: p.url,
      name: p.name,
      email: p.email,
      content: content,
      photo_base64: photoData,
    }),
  }).then(r => {
    if (r.ok) console.log(`Uploaded ${p.name}`);
    else console.warn(`Upload failed for ${p.name}: ${r.status}`);
  }).catch(e => console.warn(`Backend offline: ${e}`));

  goNext();
}

function skip() {
  const p = PROFILES[currentIndex];
  if (!results[p.url] || results[p.url].status !== 'done') {
    results[p.url] = { name: p.name, email: p.email, url: p.url, content: null, photo: null, status: 'skipped', scraped_at: null };
    saveState();
  }
  toast(`Skipped ${p.name}`, '#795548');
  goNext();
}

function goNext() {
  // Find next un-done profile
  for (let i = 1; i <= PROFILES.length; i++) {
    const idx = (currentIndex + i) % PROFILES.length;
    const r = results[PROFILES[idx].url];
    if (!r || r.status !== 'done') {
      currentIndex = idx;
      saveState();
      render();
      return;
    }
  }
  // All done
  currentIndex = (currentIndex + 1) % PROFILES.length;
  saveState();
  render();
  toast('All profiles done! Export your JSON.', '#2e7d32');
}

function jumpTo(idx) {
  currentIndex = idx;
  saveState();
  render();
}

function toggleQueue() {
  document.getElementById('queuePanel').classList.toggle('hidden');
  renderQueue();
}

function renderQueue() {
  const list = document.getElementById('queueList');
  list.innerHTML = PROFILES.map((p, i) => {
    const r = results[p.url];
    let badge = '<span class="status-badge status-pending">pending</span>';
    if (r && r.status === 'done') badge = '<span class="status-badge status-done">done</span>';
    if (r && r.status === 'skipped') badge = '<span class="status-badge status-skipped">skipped</span>';
    return `<div class="queue-item ${i === currentIndex ? 'active' : ''}" onclick="jumpTo(${i})">
      <span class="name">${p.name}</span>${badge}
    </div>`;
  }).join('');
}

function exportJSON() {
  const data = {};
  PROFILES.forEach(p => {
    if (results[p.url] && results[p.url].status === 'done') {
      data[p.url] = results[p.url];
    }
  });

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'linkedin_scrapes.json';
  a.click();
  toast(`Exported ${Object.keys(data).length} profiles`);
}

function loadPrevious() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        Object.assign(results, data);
        saveState();
        render();
        toast(`Imported ${Object.keys(data).length} profiles`);
      } catch(err) { toast('Invalid JSON', '#c62828'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function toast(msg, bg = '#2e7d32') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = bg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Photo handling
function handlePhoto(dataUrl) {
  const zone = document.getElementById('photoZone');
  zone.innerHTML = `<img src="${dataUrl}" alt="photo">`;
  // Save immediately to current profile
  const p = PROFILES[currentIndex];
  if (!results[p.url]) results[p.url] = { name: p.name, email: p.email, url: p.url, content: null, photo: null, status: 'pending' };
  results[p.url].photo = dataUrl;
  saveState();
}

document.getElementById('photoZone').addEventListener('click', () => {
  document.getElementById('photoInput').click();
});

document.getElementById('photoInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => handlePhoto(ev.target.result);
  reader.readAsDataURL(file);
});

document.getElementById('photoZone').addEventListener('dragover', (e) => {
  e.preventDefault();
  e.currentTarget.classList.add('dragover');
});
document.getElementById('photoZone').addEventListener('dragleave', (e) => {
  e.currentTarget.classList.remove('dragover');
});
document.getElementById('photoZone').addEventListener('drop', (e) => {
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = (ev) => handlePhoto(ev.target.result);
    reader.readAsDataURL(file);
  }
});

// Global paste for images (when not in textarea)
document.addEventListener('paste', (e) => {
  if (document.activeElement === document.getElementById('pasteArea')) return;
  const items = e.clipboardData.items;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      const reader = new FileReader();
      reader.onload = (ev) => handlePhoto(ev.target.result);
      reader.readAsDataURL(file);
      return;
    }
  }
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (document.activeElement === document.getElementById('pasteArea')) {
    // Enter+Cmd/Ctrl to save from within textarea
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      saveAndNext();
    }
    return;
  }
  if (e.key === 'Enter') { e.preventDefault(); saveAndNext(); }
  if (e.key === 's' || e.key === 'S') { e.preventDefault(); skip(); }
  if (e.key === 'q' || e.key === 'Q') { e.preventDefault(); toggleQueue(); }
});

// Init
loadState();
render();
</script>
</body>
</html>
