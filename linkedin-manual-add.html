<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add LinkedIn Profile</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; }

.top-bar {
  background: #111; border-bottom: 1px solid #222; padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.top-bar h1 { font-size: 17px; font-weight: 600; }
.top-bar .links { display: flex; gap: 8px; }
.top-bar a {
  padding: 6px 14px; border-radius: 6px; border: 1px solid #333;
  background: #1a1a1a; color: #ccc; text-decoration: none; font-size: 12px;
}
.top-bar a:hover { background: #252525; }
.top-bar .count { font-size: 13px; color: #4fc3f7; margin-left: 12px; }

.container { max-width: 640px; margin: 0 auto; padding: 32px 20px; flex: 1; width: 100%; }

.field { margin-bottom: 16px; }
.field label { display: block; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 600; }
.field input, .field textarea {
  width: 100%; background: #111; border: 1px solid #222; border-radius: 8px;
  padding: 10px 14px; color: #e0e0e0; font-size: 14px; outline: none; font-family: inherit;
}
.field input:focus, .field textarea:focus { border-color: #4fc3f7; }
.field input::placeholder, .field textarea::placeholder { color: #444; }
.field textarea { min-height: 280px; resize: vertical; line-height: 1.6; }
.field .hint { font-size: 10px; color: #444; margin-top: 4px; }

.row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

.photo-zone {
  border: 2px dashed #333; border-radius: 10px; padding: 16px;
  text-align: center; cursor: pointer; min-height: 80px;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
  transition: border-color 0.2s;
}
.photo-zone:hover, .photo-zone.dragover { border-color: #4fc3f7; }
.photo-zone img { max-width: 100px; max-height: 100px; border-radius: 50%; }
.photo-zone .hint { color: #555; font-size: 12px; }

.actions { display: flex; gap: 10px; margin-top: 20px; }
.btn {
  flex: 1; padding: 14px; border-radius: 8px; border: none;
  font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s;
}
.btn-save { background: #2e7d32; color: #fff; }
.btn-save:hover { background: #388e3c; }
.btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-clear { background: #222; color: #888; }
.btn-clear:hover { background: #2a2a2a; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #2e7d32; color: #fff; padding: 10px 20px; border-radius: 8px;
  font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100;
}
.toast.show { opacity: 1; }
.toast.err { background: #c62828; }

.recent { margin-top: 32px; }
.recent h2 { font-size: 14px; color: #666; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
.recent-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 12px;
  background: #111; border: 1px solid #1a1a1a; border-radius: 8px; margin-bottom: 6px;
}
.recent-item img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 1px solid #222; }
.recent-item .ri-ph { width: 36px; height: 36px; border-radius: 50%; background: #1a237e; display: flex; align-items: center; justify-content: center; color: #90caf9; font-size: 13px; font-weight: 700; }
.recent-item .ri-info { flex: 1; }
.recent-item .ri-name { font-size: 13px; font-weight: 600; }
.recent-item .ri-hl { font-size: 11px; color: #777; }
.recent-item .ri-ok { color: #4caf50; font-size: 11px; }
</style>
</head>
<body>

<div class="top-bar">
  <div style="display:flex;align-items:center;">
    <h1>Add LinkedIn Profile</h1>
    <span class="count" id="totalCount"></span>
  </div>
  <div class="links">
    <a href="linkedin-db-viewer.html">View Database</a>
  </div>
</div>

<div style="display:flex; flex:1; overflow:hidden;">
<!-- Queue sidebar -->
<div id="queueSidebar" style="width:280px; shrink:0; border-right:1px solid #222; background:#0d0d0d; overflow-y:auto; display:flex; flex-direction:column;">
  <div style="padding:12px; border-bottom:1px solid #1a1a1a;">
    <input id="queueSearch" placeholder="Filter names..." style="width:100%;background:#111;border:1px solid #222;border-radius:6px;padding:6px 10px;color:#e0e0e0;font-size:12px;outline:none;">
    <div style="font-size:10px;color:#555;margin-top:6px;" id="queueStats">0 remaining</div>
  </div>
  <div id="queueList" style="flex:1;overflow-y:auto;"></div>
</div>

<div class="container" style="flex:1; overflow-y:auto;">
  <div class="row">
    <div class="field">
      <label>LinkedIn URL *</label>
      <input id="url" placeholder="https://linkedin.com/in/someone" autofocus>
    </div>
    <div class="field">
      <label>Email</label>
      <input id="email" placeholder="their@email.com">
    </div>
  </div>

  <div class="field">
    <label>Profile Photo (paste, drag, or click)</label>
    <div class="photo-zone" id="photoZone">
      <span class="hint" id="photoHint">Cmd+V to paste screenshot, or drag image here</span>
    </div>
    <input type="file" id="photoInput" accept="image/*" style="display:none">
  </div>

  <div class="field">
    <label>Profile Content * (paste everything from LinkedIn)</label>
    <textarea id="content" placeholder="Go to their LinkedIn, Cmd+A, Cmd+C, then Cmd+V here.&#10;&#10;The backend auto-parses this into: name, headline, location, about, experience, education, skills, certifications, languages, etc."></textarea>
    <div class="hint">Don't worry about formatting — just dump the entire page. Nav bar and footer junk are stripped automatically.</div>
  </div>

  <div class="actions">
    <button class="btn btn-clear" onclick="clearForm()">Clear</button>
    <button class="btn btn-save" id="saveBtn" onclick="saveProfile()">Save to Database</button>
  </div>

  <div class="recent" id="recentSection" style="display:none">
    <h2>Recently Added</h2>
    <div id="recentList"></div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:8000';
let photoData = null;
let recentAdds = JSON.parse(localStorage.getItem('recent_manual_adds') || '[]');

function toast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => t.className = 'toast', 2500);
}

async function saveProfile() {
  const url = document.getElementById('url').value.trim();
  const email = document.getElementById('email').value.trim();
  const content = document.getElementById('content').value.trim();

  if (!url) { toast('Enter a LinkedIn URL', true); return; }
  if (!content) { toast('Paste the profile content', true); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    const resp = await fetch(`${API}/linkedin/manual-scrape`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        url,
        email: email || undefined,
        content,
        photo_base64: photoData || undefined,
      }),
    });
    const data = await resp.json();

    if (resp.ok) {
      // Extract name from the parsed content for display
      const lines = content.split('\n').filter(l => l.trim());
      let name = 'Unknown';
      // Look for name after nav junk
      for (let i = 0; i < lines.length; i++) {
        if (lines[i].trim().startsWith('Try Premium')) {
          for (let j = i + 1; j < lines.length; j++) {
            if (lines[j].trim() && lines[j].trim().length > 2 && !['', ' '].includes(lines[j].trim())) {
              name = lines[j].trim();
              break;
            }
          }
          break;
        }
      }

      // Add to recent
      recentAdds.unshift({
        url,
        name,
        photo: data.photo_url || null,
        time: new Date().toLocaleTimeString(),
      });
      if (recentAdds.length > 20) recentAdds = recentAdds.slice(0, 20);
      localStorage.setItem('recent_manual_adds', JSON.stringify(recentAdds));

      toast(`Saved! ${data.photo_url ? 'Photo uploaded to S3.' : ''}`);
      clearForm();
      renderRecent();
      updateCount();
    } else {
      toast('Save failed: ' + (data.detail || 'Unknown error'), true);
    }
  } catch (e) {
    toast('Backend offline: ' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save to Database';
  }
}

function clearForm() {
  document.getElementById('url').value = '';
  document.getElementById('email').value = '';
  document.getElementById('content').value = '';
  photoData = null;
  document.getElementById('photoZone').innerHTML = '<span class="hint" id="photoHint">Cmd+V to paste screenshot, or drag image here</span>';
  document.getElementById('url').focus();
}

// Photo handling
function handlePhoto(dataUrl) {
  photoData = dataUrl;
  document.getElementById('photoZone').innerHTML = `<img src="${dataUrl}" alt="photo">`;
}

document.getElementById('photoZone').addEventListener('click', () => document.getElementById('photoInput').click());
document.getElementById('photoInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => handlePhoto(ev.target.result);
  reader.readAsDataURL(file);
});
document.getElementById('photoZone').addEventListener('dragover', (e) => { e.preventDefault(); e.currentTarget.classList.add('dragover'); });
document.getElementById('photoZone').addEventListener('dragleave', (e) => e.currentTarget.classList.remove('dragover'));
document.getElementById('photoZone').addEventListener('drop', (e) => {
  e.preventDefault(); e.currentTarget.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = (ev) => handlePhoto(ev.target.result);
    reader.readAsDataURL(file);
  }
});

// Paste image anywhere (except when in textarea)
document.addEventListener('paste', (e) => {
  if (document.activeElement === document.getElementById('content')) return;
  const items = e.clipboardData.items;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      const reader = new FileReader();
      reader.onload = (ev) => handlePhoto(ev.target.result);
      reader.readAsDataURL(file);
      return;
    }
  }
});

// Keyboard: Cmd+Enter to save
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    saveProfile();
  }
});

// Recent adds
function renderRecent() {
  const section = document.getElementById('recentSection');
  const list = document.getElementById('recentList');
  if (recentAdds.length === 0) { section.style.display = 'none'; return; }
  section.style.display = '';
  list.innerHTML = recentAdds.map(r => {
    const ini = (r.name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    const av = r.photo ? `<img src="${r.photo}" alt="">` : `<div class="ri-ph">${ini}</div>`;
    return `<div class="recent-item">${av}<div class="ri-info"><div class="ri-name">${r.name}</div><div class="ri-hl">${r.url}</div></div><div class="ri-ok">${r.time}</div></div>`;
  }).join('');
}

async function updateCount() {
  try {
    const r = await fetch(`${API}/linkedin/database`);
    const d = await r.json();
    document.getElementById('totalCount').textContent = `${d.count || 0} profiles in DB`;
  } catch {}
}

renderRecent();
updateCount();

let scrapedUrls = new Set();

async function loadScrapedUrls() {
  try {
    const r = await fetch(`${API}/linkedin/database`);
    const d = await r.json();
    for (const item of (d.items || [])) {
      // Normalize URL for matching
      const m = item.url.match(/linkedin\.com\/in\/([^/?&#\s]+)/);
      if (m) scrapedUrls.add(m[1].replace(/\/$/, '').toLowerCase());
    }
  } catch(e) {}
  renderQueue();
}

function renderQueue() {
  const search = (document.getElementById('queueSearch').value || '').toLowerCase();
  const list = document.getElementById('queueList');
  
  let pending = 0;
  let html = '';
  for (const p of CSV_PROFILES) {
    const slug = (p.url.match(/linkedin\.com\/in\/([^/?&#\s]+)/) || [])[1] || '';
    const done = scrapedUrls.has(slug.replace(/\/$/, '').toLowerCase());
    if (!done) pending++;
    
    if (search && !p.name.toLowerCase().includes(search) && !p.email.toLowerCase().includes(search)) continue;
    
    const bg = done ? 'background:#0a0a0a;opacity:0.5;' : 'background:#111;cursor:pointer;';
    const status = done ? '<span style="color:#4caf50;font-size:10px;">done</span>' : '';
    
    html += `<div onclick="${done ? '' : `pickProfile('${p.url.replace(/'/g,"\'")}','${p.email.replace(/'/g,"\'")}','${p.name.replace(/'/g,"\'")}')`}" style="${bg}padding:8px 12px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;gap:8px;">
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;font-weight:600;color:${done?'#555':'#ccc'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div>
        <div style="font-size:10px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.email}</div>
      </div>
      ${status}
    </div>`;
  }
  
  list.innerHTML = html;
  document.getElementById('queueStats').textContent = `${pending} remaining of ${CSV_PROFILES.length}`;
}

function pickProfile(url, email, name) {
  document.getElementById('url').value = url;
  document.getElementById('email').value = email;
  document.getElementById('content').focus();
}

document.getElementById('queueSearch').addEventListener('input', renderQueue);

// Override saveProfile to also update queue
const _origSave = saveProfile;
saveProfile = async function() {
  await _origSave();
  // Mark as done
  const url = document.getElementById('url').value;
  const slug = (url.match(/linkedin\.com\/in\/([^/?&#\s]+)/) || [])[1] || '';
  if (slug) scrapedUrls.add(slug.replace(/\/$/, '').toLowerCase());
  renderQueue();
};

loadScrapedUrls();
