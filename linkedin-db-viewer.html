<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Profiles Database</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }

.top-bar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,10,0.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid #1a1a1a; padding: 14px 24px;
}
.top-row { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
.top-row h1 { font-size: 17px; font-weight: 600; white-space: nowrap; }
.search-box {
  flex: 1; background: #141414; border: 1px solid #222; border-radius: 8px;
  padding: 9px 14px; color: #e0e0e0; font-size: 14px; outline: none;
}
.search-box:focus { border-color: #1976d2; }
.search-box::placeholder { color: #555; }
.count-badge { background: #1565c0; color: #fff; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 600; white-space: nowrap; }
.btn { padding: 6px 14px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #ccc; cursor: pointer; font-size: 12px; }
.btn:hover { background: #252525; }
.btn-primary { background: #1565c0; border-color: #1976d2; color: #fff; }
.btn-primary:hover { background: #1976d2; }
.btn-green { background: #2e7d32; border-color: #388e3c; color: #fff; }

.filters { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.filter-btn {
  padding: 4px 12px; border-radius: 16px; border: 1px solid #222;
  background: #141414; color: #888; cursor: pointer; font-size: 12px; user-select: none;
}
.filter-btn:hover { border-color: #444; color: #ccc; }
.filter-btn.active { background: #1565c0; border-color: #1976d2; color: #fff; }
.dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
.dot-g { background: #4caf50; } .dot-r { background: #f44336; }
.sort-sel { background: #141414; border: 1px solid #222; border-radius: 6px; color: #aaa; padding: 5px 10px; font-size: 12px; cursor: pointer; margin-left: auto; }
.stats { display: flex; gap: 24px; padding: 10px 24px; border-bottom: 1px solid #111; background: #0d0d0d; font-size: 12px; color: #666; }
.stats strong { color: #4fc3f7; }

/* Scrape panel */
.scrape-panel {
  background: #111; border-bottom: 1px solid #222; padding: 16px 24px;
  display: none;
}
.scrape-panel.open { display: block; }
.scrape-row { display: flex; gap: 10px; align-items: end; flex-wrap: wrap; }
.scrape-row label { display: block; font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.scrape-row input { background: #0d0d0d; border: 1px solid #222; border-radius: 6px; padding: 8px 12px; color: #e0e0e0; font-size: 13px; outline: none; }
.scrape-row input:focus { border-color: #1976d2; }
.scrape-url { flex: 1; min-width: 300px; }
.scrape-liat { flex: 1; min-width: 200px; font-family: monospace; }
.scrape-status { font-size: 12px; color: #888; min-height: 20px; margin-top: 8px; }
.scrape-status.ok { color: #4caf50; }
.scrape-status.err { color: #f44336; }
.scrape-log { max-height: 200px; overflow-y: auto; margin-top: 10px; font-size: 11px; }
.scrape-log-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; border-bottom: 1px solid #111; }
.scrape-log-item .sdot { width: 6px; height: 6px; border-radius: 50%; }

.grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 14px; padding: 20px 24px;
}
.card {
  background: #111; border: 1px solid #1a1a1a; border-radius: 12px;
  overflow: hidden; transition: border-color 0.2s, transform 0.15s; cursor: pointer;
}
.card:hover { border-color: #333; transform: translateY(-2px); }
.card-top { display: flex; gap: 14px; padding: 16px 16px 10px; }
.avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 2px solid #222; flex-shrink: 0; background: #1a1a1a; }
.avatar-ph {
  width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg,#1a237e,#0d47a1);
  border: 2px solid #222; display: flex; align-items: center; justify-content: center;
  color: #90caf9; font-size: 18px; font-weight: 700; flex-shrink: 0;
}
.card-info { flex: 1; min-width: 0; }
.card-info h2 { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-info .hl { font-size: 12px; color: #999; margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
.card-info .loc { font-size: 11px; color: #555; margin-top: 3px; }
.card-tags { padding: 0 16px 8px; display: flex; flex-wrap: wrap; gap: 3px; }
.tag { font-size: 9px; padding: 2px 7px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.3px; font-weight: 600; }
.t-ok { background: #1b3a1b; color: #66bb6a; } .t-no { background: #2a1515; color: #ef5350; }
.card-about { padding: 0 16px 14px; font-size: 11px; color: #777; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

.overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); overflow-y: auto; padding: 40px 20px; }
.overlay.open { display: block; }
.detail { max-width: 740px; margin: 0 auto; background: #111; border: 1px solid #222; border-radius: 14px; padding: 28px; position: relative; }
.detail-x { position: absolute; top: 12px; right: 16px; background: none; border: none; color: #666; font-size: 24px; cursor: pointer; }
.detail-x:hover { color: #fff; }
.detail-hdr { display: flex; gap: 20px; margin-bottom: 20px; }
.detail-av { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #222; }
.d-name { font-size: 22px; font-weight: 600; }
.d-hl { font-size: 14px; color: #999; margin-top: 4px; }
.d-meta { font-size: 12px; color: #555; margin-top: 6px; line-height: 1.6; }
.d-meta a { color: #4fc3f7; text-decoration: none; }
.d-secs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
.dsec { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 10px; padding: 14px; }
.dsec.full { grid-column: 1 / -1; }
.dsec h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #4fc3f7; margin-bottom: 8px; }
.dsec pre { font-size: 12px; color: #bbb; white-space: pre-wrap; word-break: break-word; font-family: inherit; line-height: 1.6; max-height: 280px; overflow-y: auto; }
.empty { text-align: center; padding: 60px 20px; color: #444; }
.empty h2 { font-size: 18px; margin-bottom: 8px; color: #555; }
</style>
</head>
<body>
<div class="top-bar">
  <div class="top-row">
    <h1>LinkedIn Profiles</h1>
    <input class="search-box" id="search" type="text" placeholder="Search name, headline, company, skills, school..." autofocus>
    <span class="count-badge" id="cnt">0</span>
    <button class="btn btn-primary" onclick="toggleScrape()">Scrape Profile</button>
    <a class="btn btn-primary" href="linkedin-manual-add.html" style="text-decoration:none;display:inline-flex;align-items:center;gap:4px;">+ Manual Add</a>
    <button class="btn" onclick="refreshDB()">Refresh</button>
  </div>
  <div class="filters">
    <button class="filter-btn" data-f="has-photo" onclick="tf(this)"><span class="dot dot-g"></span>Photo</button>
    <button class="filter-btn" data-f="has-about" onclick="tf(this)"><span class="dot dot-g"></span>About</button>
    <button class="filter-btn" data-f="has-exp" onclick="tf(this)"><span class="dot dot-g"></span>Experience</button>
    <button class="filter-btn" data-f="has-edu" onclick="tf(this)"><span class="dot dot-g"></span>Education</button>
    <button class="filter-btn" data-f="has-skills" onclick="tf(this)"><span class="dot dot-g"></span>Skills</button>
    <button class="filter-btn" data-f="no-photo" onclick="tf(this)"><span class="dot dot-r"></span>No Photo</button>
    <button class="filter-btn" data-f="no-about" onclick="tf(this)"><span class="dot dot-r"></span>No About</button>
    <select class="sort-sel" id="sort" onchange="render()">
      <option value="name">Name A-Z</option>
      <option value="recent">Recently Scraped</option>
      <option value="fields">Most Complete</option>
    </select>
  </div>
</div>

<!-- Scrape Panel -->
<div class="scrape-panel" id="scrapePanel">
  <div class="scrape-row">
    <div class="scrape-url">
      <label>LinkedIn URL (paste and hit Enter)</label>
      <input id="scrapeUrl" placeholder="https://linkedin.com/in/someone" onkeydown="if(event.key==='Enter')scrapeOne()" style="width:100%">
    </div>
    <div class="scrape-liat">
      <label>li_at Cookie (paste once, stays saved)</label>
      <input id="scrapeLiAt" type="password" placeholder="From DevTools → Cookies → linkedin.com" style="width:100%">
    </div>
    <div style="flex:1; min-width:200px;">
      <label>User Agent (optional, rotate if blocked)</label>
      <input id="scrapeUA" placeholder="Leave blank for default Chrome UA" style="width:100%; background:#0d0d0d; border:1px solid #222; border-radius:6px; padding:8px 12px; color:#e0e0e0; font-size:12px; outline:none; font-family:monospace;">
    </div>
    <button class="btn btn-green" onclick="scrapeOne()" id="scrapeBtn" style="padding:8px 20px; margin-bottom:0;">Scrape</button>
  </div>
  <div class="scrape-status" id="scrapeStatus"></div>
  <div class="scrape-log" id="scrapeLog"></div>
</div>

<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>
<div class="empty" id="empty" style="display:none"><h2>No matches</h2><p>Try different search or filters.</p></div>
<div class="overlay" id="ov"><div class="detail" id="det"></div></div>

<script>
const API = 'http://localhost:8000';
let P = [];
let AF = new Set();
let _f = [];

// Load li_at from localStorage
const savedLiAt = localStorage.getItem('li_at') || '';
const savedUA = localStorage.getItem('scrape_ua') || '';
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('scrapeLiAt').value = savedLiAt;
  document.getElementById('scrapeUA').value = savedUA;
});

function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}
function ini(n){return (n||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase()}
function fc(p){return ['name','headline','location','about','experience','education','skills','photo_url','certifications','languages','recommendations','publications','awards','courses','organizations','volunteer','projects'].filter(f=>p[f]).length}

// ── Scrape one profile ──
function toggleScrape() {
  document.getElementById('scrapePanel').classList.toggle('open');
  if (document.getElementById('scrapePanel').classList.contains('open')) {
    document.getElementById('scrapeUrl').focus();
  }
}

async function scrapeOne() {
  const urlInput = document.getElementById('scrapeUrl');
  const liAtInput = document.getElementById('scrapeLiAt');
  const status = document.getElementById('scrapeStatus');
  const log = document.getElementById('scrapeLog');
  const btn = document.getElementById('scrapeBtn');
  const url = urlInput.value.trim();
  const liAt = liAtInput.value.trim();
  const ua = document.getElementById('scrapeUA').value.trim();

  if (!url) { status.textContent = 'Paste a LinkedIn URL first'; status.className = 'scrape-status err'; return; }

  // Save li_at + ua
  if (liAt) localStorage.setItem('li_at', liAt);
  if (ua) localStorage.setItem('scrape_ua', ua);

  btn.disabled = true;
  btn.textContent = 'Scraping...';
  status.textContent = `Scraping ${url}...`;
  status.className = 'scrape-status';

  try {
    const resp = await fetch(`${API}/linkedin/scrape-one`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, li_at: liAt || undefined, user_agent: ua || undefined }),
    });
    const data = await resp.json();

    if (data.error) {
      status.textContent = `Failed: ${data.error}`;
      status.className = 'scrape-status err';
      log.innerHTML = `<div class="scrape-log-item"><span class="sdot" style="background:#f44336"></span><span style="color:#999">${esc(url)}</span><span style="color:#f44336;margin-left:auto">${esc(data.error).slice(0,60)}</span></div>` + log.innerHTML;
    } else {
      status.textContent = `Scraped: ${data.name || 'Unknown'} — ${data.headline || ''}`;
      status.className = 'scrape-status ok';
      log.innerHTML = `<div class="scrape-log-item"><span class="sdot" style="background:#4caf50"></span><span style="color:#ccc">${esc(data.name)}</span><span style="color:#666;margin-left:auto">${esc(data.headline||'').slice(0,50)}</span></div>` + log.innerHTML;
      // Add to local data + re-render
      P = P.filter(p => p.url !== data.url);
      P.unshift(data);
      render();
    }
  } catch (e) {
    status.textContent = `Error: ${e.message}`;
    status.className = 'scrape-status err';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Scrape';
    urlInput.value = '';
    urlInput.focus();
  }
}

// ── Refresh from DB ──
async function refreshDB() {
  try {
    const resp = await fetch(`${API}/linkedin/database`);
    const data = await resp.json();
    P = data.items || [];
    updateStats();
    render();
  } catch(e) { console.error(e); }
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  let f=P.filter(p=>{
    if(q){const h=[p.name,p.headline,p.about,p.experience,p.education,p.skills,p.company,p.location,p.email].filter(Boolean).join(' ').toLowerCase();if(!q.split(/\s+/).every(w=>h.includes(w)))return false}
    for(const fl of AF){
      if(fl==='has-photo'&&!p.photo_url)return false;
      if(fl==='has-about'&&!p.about)return false;
      if(fl==='has-exp'&&!p.experience)return false;
      if(fl==='has-edu'&&!p.education)return false;
      if(fl==='has-skills'&&!p.skills)return false;
      if(fl==='no-photo'&&p.photo_url)return false;
      if(fl==='no-about'&&p.about)return false;
    }
    return true;
  });
  const s=document.getElementById('sort').value;
  if(s==='name')f.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  else if(s==='recent')f.sort((a,b)=>(b.scraped_at||'').localeCompare(a.scraped_at||''));
  else f.sort((a,b)=>fc(b)-fc(a));
  _f=f;
  document.getElementById('cnt').textContent=f.length;
  const g=document.getElementById('grid'),e=document.getElementById('empty');
  if(!f.length){g.innerHTML='';e.style.display='';return}
  e.style.display='none';
  g.innerHTML=f.map((p,i)=>{
    const av=p.photo_url?`<img class="avatar" src="${esc(p.photo_url)}" onerror="this.outerHTML='<div class=avatar-ph>${ini(p.name)}</div>'">`:`<div class="avatar-ph">${ini(p.name)}</div>`;
    const tg=f=>p[f]?'<span class="tag t-ok">'+f.replace('_',' ').replace('photo url','photo')+'</span>':'<span class="tag t-no">'+f.replace('_',' ').replace('photo url','photo')+'</span>';
    return `<div class="card" onclick="det(${i})"><div class="card-top">${av}<div class="card-info"><h2>${esc(p.name)}</h2><div class="hl">${esc(p.headline)}</div><div class="loc">${esc(p.location||'')}${p.connections?' · '+esc(p.connections)+' conn':''}</div></div></div><div class="card-tags">${tg('photo_url')}${tg('about')}${tg('experience')}${tg('education')}${tg('skills')}</div>${p.about?`<div class="card-about">${esc(p.about)}</div>`:''}</div>`
  }).join('');
}

function tf(b){const f=b.dataset.f;AF.has(f)?(AF.delete(f),b.classList.remove('active')):(AF.add(f),b.classList.add('active'));render()}

function det(i){
  const p=_f[i];if(!p)return;
  const av=p.photo_url?`<img class="detail-av" src="${esc(p.photo_url)}">`:`<div class="avatar-ph" style="width:80px;height:80px;font-size:28px">${ini(p.name)}</div>`;
  const secs=[['About',p.about,1],['Experience',p.experience,1],['Education',p.education,0],['Skills',p.skills,0],['Company',p.company,0],['Certifications',p.certifications,0],['Languages',p.languages,0],['Recommendations',p.recommendations,1],['Publications',p.publications,1],['Awards',p.awards,0],['Courses',p.courses,0],['Organizations',p.organizations,0],['Volunteer',p.volunteer,0],['Projects',p.projects,0]].filter(s=>s[1]);
  document.getElementById('det').innerHTML=`<button class="detail-x" onclick="clDet()">&times;</button><div class="detail-hdr">${av}<div><div class="d-name">${esc(p.name)}</div><div class="d-hl">${esc(p.headline)}</div><div class="d-meta">${esc(p.location||'')}${p.connections?' · '+p.connections+' connections':''}<br>${esc(p.email||'')} · <a href="${esc(p.url)}" target="_blank">LinkedIn</a><br>Scraped: ${(p.scraped_at||'').slice(0,19)}</div></div></div><div class="d-secs">${secs.map(([t,c,f])=>`<div class="dsec${f?' full':''}"><h3>${t}</h3><pre>${esc(c)}</pre></div>`).join('')}</div>`;
  document.getElementById('ov').classList.add('open');
}
function clDet(){document.getElementById('ov').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')clDet()});
document.getElementById('ov').addEventListener('click',e=>{if(e.target===document.getElementById('ov'))clDet()});
document.getElementById('search').addEventListener('input',render);

function updateStats(){
  document.getElementById('stats').innerHTML=`<div><strong>${P.length}</strong> profiles</div><div><strong>${P.filter(p=>p.photo_url).length}</strong> photos</div><div><strong>${P.filter(p=>p.about).length}</strong> about</div><div><strong>${P.filter(p=>p.experience).length}</strong> experience</div><div><strong>${P.filter(p=>p.education).length}</strong> education</div><div><strong>${P.filter(p=>p.skills).length}</strong> skills</div>`;
}

// Boot — try loading from API first, fallback to embedded
P = [{"experience": "Founder & Managing Partner\nxNova VC · Full-time\nJul 2025 - Present · 9 mos\nxNova VC is a Silicon Valley–based early-stage venture firm backing founders of the AI-Native era. We explore the unknown Nova and accelerate it into exponential growth — turning first sparks into rising Novas that illuminate the AI frontier. With a unique Founding Council and LP Operator Network, we are practitioner-led, agile, and committed beyond capital — empowering founders to shine from ignition to orbit.… more\nFounder\nSilicon Valley Innovation Academy · Self-employed\nApr 2023 - Present · 3 yrs\nFounded prior to xNova VC, SVIA (svia.ai) is a founder-led operating and advisory platform empowering global entrepreneurs through strategic advisory and cross-border innovation networks, with selective angel participation.\nSVIA was established to bring structure and continuity to long-standing personal investing, founder support, and ecosystem engagement. Through SVIA, early-stage companies across a range of technology and innovation-driven sectors have been supported through hands-on support and/or selective capital participation, such as Apostle Bio, Aviva Links (acquired by NXP), Metafoodx, CubeVi, Altos Bank, Turing AI, Traini (PetGPT), and BoxNearby. SVIA has also participated in the venture ecosystem through select limited partner positions in top-tier venture capital funds.\nThe experience, pattern recognition, and founder-level insights accumulated through SVIA later informed the formation of xNova VC, marking a natural evolution from hands-on operator engagement and structured personal investing into a more institutional, fund-based investment approach.… more\nHead of Product Management\nCicada-Speech · Full-time\nApr 2021 - Apr 2025 · 4 yrs 1 mo\nPalo Alto, California, United States\nDay 1 founding team member at Cicada Speech, contributing to the company’s vision, core product strategy, and early team formation from inception through initial scale.\n- Led onnects beautifully with multivariable calculus (yes, including the Chain Rule), and every December since, I’ve returned to teach it again.\n\nFor years I reused the same materials—equations, examples, simple demos—because the math doesn’t change. But the students have. They already understand AI applications deeply. Many can prompt ChatGPT better than I can. They’re appropriately skeptical about bias, hallucinations, and the scale of today’s frontier models.\n\nWhat remains opaque to most of them is how ML models actually learn:\n• how training and test data are used\n• how stochastic gradient descent works\n• how network structure influences behavior\n• why training methods matter\n\nSo a few weeks ago, I set out to rebuild my teaching approach from scratch.\nI created LearnCurve with some coding help from Claude 4.5 Opus, based on three principles:\n\n1.    Keep the model small and simple. Train a tiny network to match an arbitrary single-input, single-output algebraic function—small enough that anyone can see every equation and understand the flow at a glance.\n\n2.    Make the learning process visual and interactive. Students can explore how network structure, training effort, and dataset size affect convergence, accuracy, and compute cost. The tool provides four coordinated views: network structure, ground truth vs. model estimates, loss over iterations, and a loss landscape showing the descent path.\n\n3.    Make it easy for anyone to use. LearnCurve is a single self-contained index.html file with embedded CSS and JavaScript. It runs locally and safely on any machine. It’s released under the MIT license, and hosted on GitHub so anyone can open it and experiment within seconds.\nIf you’re curious—or if you have a high-schooler in your life—feel free to try it out and share suggestions:\n\nhttps://lnkd.in/geTX-4Ma\n\n\n150 · 9 comments\n\nPost\n\nThink like a startup CEO.\n\nAs I've reflected on my times as a startup CEO, I've realized that there are key lessons for almost any leader or strategist to consider.\n\nThe two biggest lessons:\n\n1) Keep a relentless focus on clear communications - keep your team, your customers and other stakeholders in the loop on the successes, the challenges and the evolving climate.  If they know what's happening they will consistency make better decisions and build their trust in the mission and leadership of the organization - INVALUABLE.\n\n2) Constantly seek the right balance between strategic clarity and agility. It is wonderful to have decisive, detailed and stable strategic direction for products, business models, engineering priorities, channels and investments, but conditions DO change.  Achieve enough awareness and realism of your progress to know when major changes will actually improve outcomes and not just cause churn.  And once you must change, do it emphatically and openly - INVALUABLE.\n\nWhatever role you play today, learning lessons from the struggles and victories of startups  will help you thrive.  My self-paced course is now available on-line.\n\nSign up now! https://lnkd.in/g8CMmAkv\n\nA stylized, hand-drawn illustration of an androgynous ship captain steering through rough seas. The captain, wearing a navy coat and tricorn hat, grips the wooden wheel with one hand and holds a flat compass in the other while glancing at it. Wooden deck planks are visible beneath them, with dark blue waves and swirling clouds rising dramatically beyond the ship’s railing. The image has bold outlines, textured shading, and a warm, vintage palette of blues, browns, and golds.\n143 · 7 comments\n\nPost\n\nWant to Build the Next Windsurf or Cursor?\n\nAI startups are hot — but it’s a jungle.\n\nEveryone’s racing to build the next Cursor or Cognition. So what really made these teams take off — and how can you find the next space with the analogous traits? 👇\n\nThe runaway success of AI coding assistants offers one model for success.\nThere’s little open space left in that niche, but the pattern is clear — and repeatable.\n\nChart 1: The Landscape\nThe AI Coding Agent Landscape – 2025 shows how quickly this market matured — billion-dollar valuations only two years after launch.\n\nChart 2: The Success Dimensions\nThese startups shared five common traits:\n1️⃣ Use Case Size — large, coherent user communities\n2️⃣ Workflow Integration — deep fit within daily tools\n3️⃣ Adoption Entry Points — on-ramps for individuals and enterprises\n4️⃣ Enterprise Impact — measurable ROI and automation value\n5️⃣ Outcome Testability — instant feedback: does it work?\n...plus one bonus characteristic - the underlying GenAI models are natively excellent at the task - code generation - without much further training or encouragement!\n\nSpaces with similar profiles are where breakout AI companies will emerge.\n\nBringing theory and experience together to build startups with this success DNA is what my Startup Bootcamp is all about. Now available as a self-paced on-line course!\n👉https://lnkd.in/g52G-CJG\n\nTable comparing leading AI coding startups (Cursor, Cognition, Windsurf, Replit, Lovable, Supermaven, Continue.dev) by founding year, focus, funding, and valuation, showing rapid growth and consolidation in AI developer tools.\n41 · 1 comment\n\nPost\n\nJungles are hot. Deserts are hot.\n\nAnd both are full of startups.\n\nOne of the most interesting questions in tech right now is this:\nWhere are the real opportunities—in AI startups and in deep-tech startups—and what makes each so hard?\n\nThese two worlds aren’t in opposition. They’re deeply complementary.\nBut they demand different skills, take different risks, and follow different paths to success. Let’s look at why each is hot, what makes each hard, and how founders can thrive in both.\n\nAI startups live in a crowded jungle.\n\nThey can grow fast, but they’re surrounded by thousands of others reaching for the same light. They’re built on mainstream technology—open source, cloud compute, APIs, frameworks, toolkits, and now large language models.\n\nThat abundance is both a gift and a curse.\n\nAnyone can build fast—but differentiation is brutal.\nThe hard part isn’t the science so much as standing out.\n\nYour job is to find your unique patch of sunlight:  a customer insight, a workflow, or a data edge others haven’t seen. Grow fast enough, strong enough, before someone shades you out.\n\nBecause in the AI jungle, the question isn’t can you build it?\nIt’s can you survive long enough to make it matter?\n\nDeep-tech startups  live in the desert .\n\nThey’re not fighting for sunlight—they’re fighting for water.\nThey’re born from deep science: new circuits, materials, sensors, energy systems, quantum devices. Their challenge isn’t crowding—it’s time.\nTime to build. Time to prove. Time to fund. They demand specialized expertise, expensive prototyping, and long testing cycles. Years may pass before the first product or customer. But when they succeed, they reshape industries.\nThey don’t get quick traction—they earn respect.\n\nWith these startups, there's a risk spectrum.  At one end: “a small matter of programming.”  At the other: “fundamental science.”\nBetween them lie algorithms, chips, sensors, materials, and processes.\nAI startups play at the fast-iteration end—rapid growth, intense competition.\nDeep-tech startups live at the slow-burn end—high barriers, huge payoff.\n\nThat’s why I built my Startup Bootcamp — a free online course for ambitious technologists and entrepreneurs who want to build something truly impactful.\nAcross 15 live sessions, Nov 3 – Dec 12, 2025, we explored both sides of the frontier: how to turn deep technology into business impact, and how to carve out an enduring edge in the AI explosion. It’s designed for engineers, scientists, and product leaders who’ve been in the trenches— and want to understand how great startups grow from raw innovation to real scale.\n\nNow the same lectures are available in a self-paced course.\n\nTake a look at my latest
